<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Test</title>
</head>
<body>

    <!-- Step 1: Layout -->
    <header>
        <h1>Hands on Test on HTML</h1>
    </header>

     <!-- Step 2: Navigation -->
    <nav>
        <ul>
            <li><a href="#image-link">Image Link</a></li>
            <li><a href="#video-section">Video Section</a></li>
            <li><a href="#contact-form">Contact Form</a></li>
        </ul>
    </nav>

    <main>
        <!-- Step 3: image -->
        <section id="image-link">
            <h2>Image Link</h2>
            <p>Click the image below to send an email:</p>
            
            <a href="mailto:sabbir@gmail.com">
                <img 
                    src="https://images.unsplash.com/photo-1593108408993-58ee9c7825c2?ixid=MnwxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8&ixlib=rb-1.2.1&auto=format&fit=crop&w=1470&q=80" 
                    alt="Send Email" 
                    width="900" 
                    height="600">
            </a>
        </section>

        <hr>

        <!-- Step 4: Video -->
        <section id="video-section">
            <h2>Video Section</h2>
            <video width="800" controls poster="https://assets.codepen.io/32795/poster.png">
                <source src="http://media.w3.org/2010/05/sintel/trailer.mp4" type="video/mp4">
                <source src="http://media.w3.org/2010/05/sintel/trailer.webm" type="video/webm">
                <source src="http://media.w3.org/2010/05/sintel/trailer.ogv" type="video/ogg">
                
                <track kind="subtitles" src="subtitles_en.vtt" srclang="en" label="English">
                <track kind="subtitles" src="subtitles_de.vtt" srclang="de" label="German Deutsch">
                
            </video>
        </section>
        <hr>
    </main>
    
</body>
</html>
