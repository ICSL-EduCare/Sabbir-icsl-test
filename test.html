<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Test</title>
</head>
<body>

    <!-- Step 1: Layout -->
    <header>
        <h1>Hands on Test on HTML</h1>
    </header>

     <!-- Step 2: Navigation -->
    <nav>
        <ul>
            <li><a href="#image-link">Image Link</a></li>
            <li><a href="#video-section">Video Section</a></li>
            <li><a href="#contact-form">Contact Form</a></li>
        </ul>
    </nav>

    <main>
        <!-- Step 3: image -->
        <section id="image-link">
            <h2>Image Link</h2>
            <p>Click the image below to send an email:</p>
            
            <a href="mailto:sabbir@gmail.com">
                <img 
                    src="https://images.unsplash.com/photo-1593108408993-58ee9c7825c2?ixid=MnwxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8&ixlib=rb-1.2.1&auto=format&fit=crop&w=1470&q=80" 
                    alt="Send Email" 
                    width="900" 
                    height="600">
            </a>
        </section>

        <hr>

        <!-- Step 4: Video -->
        <section id="video-section">
            <h2>Video Section</h2>
            <video width="800" controls poster="https://assets.codepen.io/32795/poster.png">
                <source src="http://media.w3.org/2010/05/sintel/trailer.mp4" type="video/mp4">
                <source src="http://media.w3.org/2010/05/sintel/trailer.webm" type="video/webm">
                <source src="http://media.w3.org/2010/05/sintel/trailer.ogv" type="video/ogg">
                
                <track kind="subtitles" src="subtitles_en.vtt" srclang="en" label="English">
                <track kind="subtitles" src="subtitles_de.vtt" srclang="de" label="German Deutsch">
                
            </video>
        </section>
        <hr>

        <!-- Step 5: Contact Form -->
        <section id="contact-form">
            <h2>Contact Form</h2>
            <form action="#" method="post">
                <fieldset>
                    <legend>Contact Form</legend>

                    <label for="fullname">Your Name:</label><br>
                    <input type="text" id="fullname" name="fullname" required><br><br>

                    <label for="phone">Your Phone:</label><br>
                    <input type="tel" id="phone" name="phone" pattern="^(\+880|0)?1[3-9]\d{8}$" placeholder="e.g. 01712345678" required><br><br>

                    <label for="email">Your Email:</label><br>
                    <input type="email" id="email" name="email" required><br><br>

                    <label for="country">Your Country:</label><br>
                    <select id="country" name="country">
                        <option value="bd">Bangladesh</option>
                        <option value="us">United States</option>
                        <option value="uk">United Kingdom</option>
                        <option value="ca">Canada</option>
                        <option value="au">Australia</option>
                        <option value="de">Germany</option>
                        <option value="fr">France</option>
                        <option value="jp">Japan</option>
                    </select><br><br>

                    <label for="state">Your State:</label><br>
                    <select id="state" name="state">
                        <option value="dhaka">Dhaka</option>
                        <option value="ctg">Chittagong</option>
                        <option value="khulna">Khulna</option>
                        <option value="rajshahi">Rajshahi</option>
                        <option value="sylhet">Sylhet</option>
                        <option value="barishal">Barishal</option>
                        <option value="rangpur">Rangpur</option>
                        <option value="mymensingh">Mymensingh</option>
                        <option value="comilla">Comilla</option>
                        <option value="narayanganj">Narayanganj</option>
                    </select><br><br>

                    <label for="message">Your Message:</label><br>
                    <textarea id="message" name="message" rows="5" cols="40"></textarea><br><br>

                    <input type="submit" value="Submit">

                    <input type="reset" value="Reset">
                </fieldset>
            </form>
        </section>
    </main>
    <hr>

    <footer>
        <p>&copy; 2026 All Rights Reserved.</p>
    </footer>
    
</body>
</html>
